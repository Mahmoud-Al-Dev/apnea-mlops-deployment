global:
  scrape_interval: 15s      # How often Prometheus will fetch metrics
  evaluation_interval: 15s  # How often to evaluate rules

scrape_configs:
  # 1. Monitor Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # 2. Monitor your t3.medium EC2 hardware (CPU, RAM, Disk)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # 3. Monitor your FastAPI ML Application (Inference times, request rates)
  - job_name: 'apnea-api'
    static_configs:
      - targets: ['apnea-api:8000']
